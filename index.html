<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaTools - 免费在线图片视频处理工具</title>
    <meta name="description" content="免费在线图片格式转换、图片压缩、图片尺寸调整、视频去水印等工具">
    <meta name="keywords" content="图片转换,图片压缩,图片尺寸调整,视频去水印,在线工具">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-5px);

        }

        .tool-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .tool-title {
            font-size: 1.4rem;

            color: #333;
        }

        .tool-desc {
            color: #666;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .upload-area {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            border: 3px dashed #667eea;
            transition: border-color 0.3s;
        }

        .upload-area:hover {
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;

        .btn:hover {

            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {

        }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }

        #fileInput {
            display: none;
        }

        .preview-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            display: none;
        }

        .preview-area.active {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-group label {
            font-weight: bold;
            color: #333;
        }

        .option-group select, .option-group input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 150px;
        }

        .result-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            display: none;
        }

        .result-area.active {
            display: block;
        }

        .download-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        /* 视频处理样式 */
        .video-container {
            max-width: 100%;
            margin: 20px 0;
            position: relative;
            display: inline-block;
        }

        .video-preview {
            max-width: 100%;
            max-height: 450px;
            border-radius: 10px;
            background: #000;
        }

        .watermark-overlay {
            position: absolute;
            border: 3px solid #ff4444;
            background: rgba(255, 68, 68, 0.15);
            cursor: move;
            min-width: 50px;
            min-height: 30px;
            z-index: 10;
        }

        .watermark-overlay::before {
            content: '水印区域';
            position: absolute;
            top: -25px;
            left: 0;
            background: #ff4444;
            color: white;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 3px;
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
        }

        .info-box h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .info-box ul {
            margin-left: 20px;
            color: #666;
        }

        .info-box li {
            margin: 5px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 25px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 MediaTools</h1>
            <p class="subtitle">免费在线图片视频处理工具 - 无需注册，即开即用</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card" onclick="selectTool('format')">
                <div class="tool-icon">🔄</div>
                <h3 class="tool-title">图片格式转换</h3>
                <p class="tool-desc">支持 PNG、JPG、WEBP、GIF 等格式互转</p>
            </div>

            <div class="tool-card" onclick="selectTool('compress')">
                <div class="tool-icon">📦</div>
                <h3 class="tool-title">图片压缩</h3>
                <p class="tool-desc">智能压缩图片，保持画质，减小体积</p>
            </div>

            <div class="tool-card" onclick="selectTool('resize')">
                <div class="tool-icon">📐</div>
                <h3 class="tool-title">图片尺寸调整</h3>
                <p class="tool-desc">自定义宽高，批量调整图片尺寸</p>
            </div>

            <div class="tool-card" onclick="selectTool('watermark')">
                <div class="tool-icon">🎬</div>
                <h3 class="tool-title">视频去水印</h3>
                <p class="tool-desc">智能识别并去除视频水印</p>
            </div>
        </div>

        <!-- 工作区 -->
        <div id="workspace" style="display: none;">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p class="upload-text" id="uploadHint">点击或拖拽文件到此处上传</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleFileSelect(event)">
            </div>

            <div class="preview-area" id="previewArea">
                <h3 style="margin-bottom: 20px;">预览</h3>

                <!-- 图片预览 -->
                <div id="imagePreviewContainer">
                    <img id="previewImage" class="preview-image" alt="预览">
                </div>

                <!-- 视频预览 -->
                <div id="videoPreviewContainer" style="display: none;">
                    <div class="video-container" id="videoContainer">
                        <video id="previewVideo" class="video-preview" controls></video>
                    </div>
                </div>

                <div class="options" id="toolOptions">
                    <!-- 动态生成选项 -->
                </div>

                <div id="actionButtons">
                    <button class="btn" id="processBtn" onclick="processMedia()">开始处理</button>
                    <button class="btn btn-danger" onclick="resetWorkspace()">取消</button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="preview-area" id="progressArea" style="display: none;">
                <h3 style="margin-bottom: 20px;">处理中...</h3>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                    </div>
                    <p class="progress-text" id="progressText">正在处理...</p>
                </div>
            </div>

            <div class="result-area" id="resultArea">
                <h3 style="margin-bottom: 20px; color: #38ef7d;">✅ 处理完成！</h3>

                <div id="imageResultContainer">
                    <img id="resultImage" class="preview-image" alt="结果">
                </div>

                <div id="videoResultContainer" style="display: none;">
                    <video id="resultVideo" class="video-preview" controls></video>
                </div>

                <br><br>
                <button class="btn btn-secondary download-btn" onclick="downloadResult()">下载结果</button>
                <button class="btn" onclick="resetWorkspace()">继续处理</button>
            </div>
        </div>

        <footer>
            <p>© 2026 MediaTools - 免费在线工具</p>
            <p>隐私政策 | 使用条款 | 联系我们</p>
        </footer>
    </div>

    <!-- FFmpeg.wasm -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/util.js"></script>

    <script>
        let currentTool = '';
        let uploadedFile = null;
        let ffmpeg = null;
        let watermarkBox = null;
        let videoDuration = 0;

        // 初始化 FFmpeg
        async function initFFmpeg() {
            if (ffmpeg) return ffmpeg;

            const { FFmpeg } = FFmpegWASM;
            ffmpeg = new FFmpeg();

            ffmpeg.on('progress', ({ progress }) => {
                const percent = Math.round(progress * 100);
                updateProgress(percent, `处理进度: ${percent}%`);
            });

            ffmpeg.on('log', ({ message }) => {
                console.log('FFmpeg:', message);
            });

            await ffmpeg.load({
                coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
            });

            return ffmpeg;
        }

        function selectTool(tool) {
            currentTool = tool;
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('previewArea').classList.remove('active');
            document.getElementById('resultArea').classList.remove('active');
            document.getElementById('progressArea').style.display = 'none';

            // 更新上传提示
            const hint = document.getElementById('uploadHint');
            const fileInput = document.getElementById('fileInput');

            if (tool === 'watermark') {
                hint.textContent = '点击或拖拽视频文件到此处上传 (支持 MP4, WEBM, MOV)';
                fileInput.accept = 'video/*';
            } else {
                hint.textContent = '点击或拖拽图片文件到此处上传';
                fileInput.accept = 'image/*';
            }

            // 滚动到工作区
            document.getElementById('workspace').scrollIntoView({ behavior: 'smooth' });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            uploadedFile = file;

            if (currentTool === 'watermark' && file.type.startsWith('video/')) {
                handleVideoFile(file);
            } else if (file.type.startsWith('image/')) {
                handleImageFile(file);
            } else {
                alert('请选择正确的文件类型！');
                return;
            }
        }

        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('imagePreviewContainer').style.display = 'block';
                document.getElementById('videoPreviewContainer').style.display = 'none';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('previewArea').classList.add('active');
                showToolOptions();
            };
            reader.readAsDataURL(file);
        }

        function handleVideoFile(file) {
            const video = document.getElementById('previewVideo');
            video.src = URL.createObjectURL(file);

            video.onloadedmetadata = function() {
                videoDuration = video.duration;
                document.getElementById('imagePreviewContainer').style.display = 'none';
                document.getElementById('videoPreviewContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('previewArea').classList.add('active');
                showToolOptions();

                // 添加水印选择框
                setTimeout(() => {
                    createWatermarkSelector();
                }, 100);
            };
        }

        function createWatermarkSelector() {
            const container = document.getElementById('videoContainer');

            // 移除旧的选择框
            const oldBox = document.getElementById('watermarkBox');
            if (oldBox) oldBox.remove();

            // 创建新的选择框
            watermarkBox = document.createElement('div');
            watermarkBox.id = 'watermarkBox';
            watermarkBox.className = 'watermark-overlay';
            watermarkBox.style.width = '150px';
            watermarkBox.style.height = '50px';
            watermarkBox.style.top = '10px';
            watermarkBox.style.right = '10px';

            container.appendChild(watermarkBox);

            // 添加拖拽功能
            makeDraggable(watermarkBox, container);
        }

        function makeDraggable(element, container) {
            let isDragging = false;
            let startX, startY, startLeft, startTop;

            element.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = element.offsetLeft;
                startTop = element.offsetTop;
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;

                let newLeft = startLeft + deltaX;
                let newTop = startTop + deltaY;

                // 边界检查
                const maxLeft = container.offsetWidth - element.offsetWidth;
                const maxTop = container.offsetHeight - element.offsetHeight;

                newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                newTop = Math.max(0, Math.min(newTop, maxTop));

                element.style.left = newLeft + 'px';
                element.style.top = newTop + 'px';
                element.style.right = 'auto';
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        function showToolOptions() {
            const optionsDiv = document.getElementById('toolOptions');

            switch(currentTool) {
                case 'format':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>输出格式</label>
                            <select id="outputFormat">
                                <option value="png">PNG</option>
                                <option value="jpg">JPG</option>
                                <option value="webp">WEBP</option>
                            </select>
                        </div>
                    `;
                    break;

                case 'compress':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>压缩质量</label>
                            <select id="quality">
                                <option value="0.9">高质量 (90%)</option>
                                <option value="0.7" selected>中等质量 (70%)</option>
                                <option value="0.5">低质量 (50%)</option>
                            </select>
                        </div>
                    `;
                    break;

                case 'resize':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>宽度 (px)</label>
                            <input type="number" id="newWidth" placeholder="自动">
                        </div>
                        <div class="option-group">
                            <label>高度 (px)</label>
                            <input type="number" id="newHeight" placeholder="自动">
                        </div>
                    `;
                    break;

                case 'watermark':
                    optionsDiv.innerHTML = `
                        <div class="info-box">
                            <h4>💡 使用说明</h4>
                            <ul>
                                <li>拖动红色框选择水印位置</li>
                                <li>调整框的大小覆盖整个水印区域</li>
                                <li>点击"开始处理"去除水印</li>
                                <li>处理时间取决于视频长度，请耐心等待</li>
                            </ul>
                        </div>
                        <div class="option-group">
                            <label>去除方式</label>
                            <select id="removeMethod">
                                <option value="blur">模糊处理</option>
                                <option value="fill">智能填充</option>
                            </select>
                        </div>
                    `;
                    break;
            }
        }

        async function processMedia() {
            if (!uploadedFile) return;

            if (currentTool === 'watermark') {
                await processVideoWatermark();
            } else {
                processImage();
            }
        }

        function processImage() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = function() {
                switch(currentTool) {
                    case 'format':
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        break;

                    case 'compress':
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        break;

                    case 'resize':
                        const newWidth = document.getElementById('newWidth').value || img.width;
                        const newHeight = document.getElementById('newHeight').value || img.height;
                        canvas.width = newWidth;
                        canvas.height = newHeight;
                        ctx.drawImage(img, 0, 0, newWidth, newHeight);
                        break;
                }

                const format = currentTool === 'format' ?
                    document.getElementById('outputFormat').value : 'png';
                const quality = currentTool === 'compress' ?
                    parseFloat(document.getElementById('quality').value) : 0.9;

                const mimeType = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
                const resultDataUrl = canvas.toDataURL(mimeType, quality);

                document.getElementById('resultImage').src = resultDataUrl;
                document.getElementById('imageResultContainer').style.display = 'block';
                document.getElementById('videoResultContainer').style.display = 'none';
                document.getElementById('previewArea').classList.remove('active');
                document.getElementById('resultArea').classList.add('active');
            };

            img.src = document.getElementById('previewImage').src;
        }

        async function processVideoWatermark() {
            try {
                // 显示进度
                document.getElementById('previewArea').classList.remove('active');
                document.getElementById('progressArea').style.display = 'block';
                updateProgress(5, '正在初始化 FFmpeg...');

                // 初始化 FFmpeg
                await initFFmpeg();
                updateProgress(10, '正在加载视频...');

                // 获取水印区域
                const video = document.getElementById('previewVideo');
                const watermarkRect = watermarkBox.getBoundingClientRect();
                const videoRect = video.getBoundingClientRect();

                // 计算相对位置和大小
                const scaleX = video.videoWidth / videoRect.width;
                const scaleY = video.videoHeight / videoRect.height;

                const x = Math.round((watermarkRect.left - videoRect.left) * scaleX);
                const y = Math.round((watermarkRect.top - videoRect.top) * scaleY);
                const width = Math.round(watermarkRect.width * scaleX);
                const height = Math.round(watermarkRect.height * scaleY);

                updateProgress(15, '正在处理视频...');

                // 读取视频文件
                const { fetchFile } = FFmpegUtil;
                const inputData = await fetchFile(uploadedFile);
                await ffmpeg.writeFile('input.mp4', inputData);

                updateProgress(20, '正在去除水印...');

                // 使用 delogo 滤镜去除水印
                const method = document.getElementById('removeMethod').value;
                let filter;

                if (method === 'blur') {
                    // 模糊处理
                    filter = `delogo=x=${x}:y=${y}:w=${width}:h=${height}:show=0`;
                } else {
                    // 智能填充
                    filter = `delogo=x=${x}:y=${y}:w=${width}:h=${height}:show=0`;
                }

                await ffmpeg.exec([
                    '-i', 'input.mp4',
                    '-vf', filter,
                    '-c:a', 'copy',
                    '-preset', 'fast',
                    'output.mp4'
                ]);

                updateProgress(90, '正在生成输出文件...');

                // 读取输出文件
                const outputData = await ffmpeg.readFile('output.mp4');
                const blob = new Blob([outputData.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);

                // 显示结果
                document.getElementById('resultVideo').src = url;
                document.getElementById('imageResultContainer').style.display = 'none';
                document.getElementById('videoResultContainer').style.display = 'block';
                document.getElementById('progressArea').style.display = 'none';
                document.getElementById('resultArea').classList.add('active');

                // 清理
                await ffmpeg.deleteFile('input.mp4');
                await ffmpeg.deleteFile('output.mp4');

            } catch (error) {
                console.error('处理失败:', error);
                alert('处理失败: ' + error.message);
                document.getElementById('progressArea').style.display = 'none';
                document.getElementById('previewArea').classList.add('active');
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').textContent = percent + '%';
            document.getElementById('progressText').textContent = text;
        }

        function downloadResult() {
            if (currentTool === 'watermark') {
                const video = document.getElementById('resultVideo');
                const link = document.createElement('a');
                link.download = 'mediatools-video-no-watermark.mp4';
                link.href = video.src;
                link.click();
            } else {
                const resultImage = document.getElementById('resultImage');
                const link = document.createElement('a');
                link.download = 'mediatools-result.png';
                link.href = resultImage.src;
                link.click();
            }
        }

        function resetWorkspace() {
            uploadedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('previewArea').classList.remove('active');
            document.getElementById('resultArea').classList.remove('active');
            document.getElementById('progressArea').style.display = 'none';

            // 移除水印选择框
            const oldBox = document.getElementById('watermarkBox');
            if (oldBox) oldBox.remove();
        }

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#764ba2';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
