<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaTools - 免费在线图片视频处理工具</title>
    <meta name="description" content="免费在线图片格式转换、图片压缩、图片尺寸调整、视频去水印等工具">
    <meta name="keywords" content="图片转换,图片压缩,图片尺寸调整,视频去水印,在线工具">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .tool-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .tool-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #333;
        }
        
        .tool-desc {
            color: #666;
            line-height: 1.6;
        }
        
        .upload-area {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            border: 3px dashed #667eea;
            transition: border-color 0.3s;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            display: none;
        }
        
        .preview-area.active {
            display: block;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .option-group label {
            font-weight: bold;
            color: #333;
        }
        
        .option-group select, .option-group input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .result-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            display: none;
        }
        
        .result-area.active {
            display: block;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        /* 广告位 */
        .ad-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 MediaTools</h1>
            <p class="subtitle">免费在线图片视频处理工具 - 无需注册，即开即用</p>
        </header>
        
        <!-- 广告位1 -->
        <div class="ad-container" id="ad-top">
            广告位 - Adsterra/HilltopAds
        </div>
        
        <div class="tools-grid">
            <div class="tool-card" onclick="selectTool('format')">
                <div class="tool-icon">🔄</div>
                <h3 class="tool-title">图片格式转换</h3>
                <p class="tool-desc">支持 PNG、JPG、WEBP、GIF 等格式互转</p>
            </div>
            
            <div class="tool-card" onclick="selectTool('compress')">
                <div class="tool-icon">📦</div>
                <h3 class="tool-title">图片压缩</h3>
                <p class="tool-desc">智能压缩图片，保持画质，减小体积</p>
            </div>
            
            <div class="tool-card" onclick="selectTool('resize')">
                <div class="tool-icon">📐</div>
                <h3 class="tool-title">图片尺寸调整</h3>
                <p class="tool-desc">自定义宽高，批量调整图片尺寸</p>
            </div>
            
            <div class="tool-card" onclick="selectTool('watermark')">
                <div class="tool-icon">🎬</div>
                <h3 class="tool-title">视频去水印</h3>
                <p class="tool-desc">智能识别并去除视频水印（开发中）</p>
            </div>
        </div>
        
        <!-- 工作区 -->
        <div id="workspace" style="display: none;">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p class="upload-text">点击或拖拽文件到此处上传</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
            </div>
            
            <div class="preview-area" id="previewArea">
                <h3 style="margin-bottom: 20px;">预览</h3>
                <img id="previewImage" class="preview-image" alt="预览">
                
                <div class="options" id="toolOptions">
                    <!-- 动态生成选项 -->
                </div>
                
                <button class="btn" onclick="processImage()">开始处理</button>
            </div>
            
            <div class="result-area" id="resultArea">
                <h3 style="margin-bottom: 20px; color: #38ef7d;">✅ 处理完成！</h3>
                <img id="resultImage" class="preview-image" alt="结果">
                <br><br>
                <button class="btn download-btn" onclick="downloadResult()">下载结果</button>
            </div>
        </div>
        
        <!-- 广告位2 -->
        <div class="ad-container" id="ad-bottom">
            广告位 - Adsterra/HilltopAds
        </div>
        
        <footer>
            <p>© 2026 MediaTools - 免费在线工具</p>
            <p>隐私政策 | 使用条款 | 联系我们</p>
        </footer>
    </div>
    
    <script>
        let currentTool = '';
        let uploadedFile = null;
        
        function selectTool(tool) {
            currentTool = tool;
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('previewArea').classList.remove('active');
            document.getElementById('resultArea').classList.remove('active');
            
            // 滚动到工作区
            document.getElementById('workspace').scrollIntoView({ behavior: 'smooth' });
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            uploadedFile = file;
            
            // 显示预览
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('previewArea').classList.add('active');
                
                // 根据工具类型显示选项
                showToolOptions();
            };
            reader.readAsDataURL(file);
        }
        
        function showToolOptions() {
            const optionsDiv = document.getElementById('toolOptions');
            
            switch(currentTool) {
                case 'format':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>输出格式</label>
                            <select id="outputFormat">
                                <option value="png">PNG</option>
                                <option value="jpg">JPG</option>
                                <option value="webp">WEBP</option>
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'compress':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>压缩质量</label>
                            <select id="quality">
                                <option value="0.9">高质量 (90%)</option>
                                <option value="0.7" selected>中等质量 (70%)</option>
                                <option value="0.5">低质量 (50%)</option>
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'resize':
                    optionsDiv.innerHTML = `
                        <div class="option-group">
                            <label>宽度 (px)</label>
                            <input type="number" id="newWidth" placeholder="自动">
                        </div>
                        <div class="option-group">
                            <label>高度 (px)</label>
                            <input type="number" id="newHeight" placeholder="自动">
                        </div>
                    `;
                    break;
                    
                case 'watermark':
                    optionsDiv.innerHTML = `
                        <p style="color: #999;">视频去水印功能开发中，敬请期待...</p>
                    `;
                    break;
            }
        }
        
        function processImage() {
            if (!uploadedFile) return;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                // 根据工具类型处理
                switch(currentTool) {
                    case 'format':
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        break;
                        
                    case 'compress':
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        break;
                        
                    case 'resize':
                        const newWidth = document.getElementById('newWidth').value || img.width;
                        const newHeight = document.getElementById('newHeight').value || img.height;
                        canvas.width = newWidth;
                        canvas.height = newHeight;
                        ctx.drawImage(img, 0, 0, newWidth, newHeight);
                        break;
                }
                
                // 显示结果
                const format = currentTool === 'format' ? 
                    document.getElementById('outputFormat').value : 'png';
                const quality = currentTool === 'compress' ? 
                    parseFloat(document.getElementById('quality').value) : 0.9;
                
                const mimeType = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
                const resultDataUrl = canvas.toDataURL(mimeType, quality);
                
                document.getElementById('resultImage').src = resultDataUrl;
                document.getElementById('previewArea').classList.remove('active');
                document.getElementById('resultArea').classList.add('active');
            };
            
            img.src = document.getElementById('previewImage').src;
        }
        
        function downloadResult() {
            const resultImage = document.getElementById('resultImage');
            const link = document.createElement('a');
            link.download = 'mediatools-result.png';
            link.href = resultImage.src;
            link.click();
        }
        
        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#764ba2';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        });
    </script>
    
    <!-- 广告代码将在这里插入 -->
    <!-- Adsterra 或 HilltopAds 代码 -->
</body>
</html>
