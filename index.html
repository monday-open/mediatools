<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaTools - 免费在线图片视频处理工具</title>
    <meta name="description" content="免费在线图片格式转换、图片压缩、图片尺寸调整、视频去水印等工具">
    <meta name="keywords" content="图片转换,图片压缩,图片尺寸调整,视频去水印,在线工具">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .tool-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .tool-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        select,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            word-wrap: break-word;
        }

        .error {
            color: #dc3545;
            padding: 10px;
            background: #f8d7da;
            border-radius: 8px;
            margin-top: 10px;
        }

        .success {
            color: #28a745;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            margin-top: 10px;
        }

        .file-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .formats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .format-tag {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .legal-notice {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MediaTools</h1>
            <div class="subtitle">免费在线图片视频处理工具</div>
        </header>

        <div class="main-content">
            <!-- 图片格式转换 -->
            <div class="tool-section">
                <h2>🖼️ 图片格式转换</h2>
                <div class="form-group">
                    <label>选择输入格式</label>
                    <select id="fromFormat">
                        <option value="png">PNG</option>
                        <option value="jpg">JPG</option>
                        <option value="webp">WEBP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>选择输出格式</label>
                    <select id="toFormat">
                        <option value="png">PNG</option>
                        <option value="jpg">JPG</option>
                        <option value="webp">WEBP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>上传图片</label>
                    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
                </div>
                <button onclick="convertImage()">开始转换</button>
                <div id="imageResult" class="result-section" style="display: none;"></div>
            </div>

            <!-- 抖音去水印 -->
            <div class="tool-section">
                <h2>🎬 抖音视频去水印</h2>
                <div class="form-group">
                    <label>输入抖音视频链接</label>
                    <input type="text" id="douyinUrl" placeholder="https://www.douyin.com/video/...">
                </div>
                <button onclick="removeWatermark()">去水印</button>
                <div id="watermarkResult" class="result-section" style="display: none;"></div>
            </div>
        </div>

        <!-- 支持的格式说明 -->
        <div class="tool-section">
            <h2>✨ 支持的格式</h2>
            <div class="formats">
                <span class="format-tag">PNG</span>
                <span class="format-tag">JPG</span>
                <span class="format-tag">WEBP</span>
            </div>
            <div class="legal-notice">
                <strong>法律声明：</strong>本工具仅供学习和个人使用，请勿用于非法用途。使用本工具产生的任何后果由用户自行承担。
            </div>
        </div>

        <footer>
            <p>MediaTools - 免费在线图片视频处理工具</p>
            <p style="font-size: 14px; margin-top: 10px;">GitHub: https://github.com/monday-open/mediatools</p>
        </footer>
    </div>

    <script type="module">
        // 图片格式转换函数
        window.convertImage = async function() {
            const fromFormat = document.getElementById('fromFormat').value;
            const toFormat = document.getElementById('toFormat').value;
            const imageInput = document.getElementById('imageInput');

            const resultDiv = document.getElementById('imageResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>转换中...</p>';

            try {
                const file = imageInput.files[0];
                if (!file) {
                    throw new Error('请选择图片');
                }

                const imageData = await readFileAsDataURL(file);

                // 使用 Canvas 进行格式转换
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = imageData;
                });

                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // 导出为指定格式
                const mimeType = `image/${toFormat}`;
                const dataUrl = canvas.toDataURL(mimeType, 0.9);

                // 创建下载链接
                const blob = await fetch(dataUrl).then(res => res.blob());
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `converted.${toFormat}`;
                a.click();
                URL.revokeObjectURL(url);

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>转换成功！</strong><br>
                        原格式: ${fromFormat.toUpperCase()}<br>
                        新格式: ${toFormat.toUpperCase()}
                    </div>
                    <div class="file-info">
                        文件大小: ${(file.size / 1024).toFixed(2)} KB
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error"><strong>转换失败：</strong>${error.message}</div>`;
            }
        };

        // 读取文件为 DataURL
        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 抖音去水印函数
        window.removeWatermark = async function() {
            const douyinUrl = document.getElementById('douyinUrl').value;
            const resultDiv = document.getElementById('watermarkResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>解析中...</p>';

            try {
                const response = await fetch(`/api/watermark?url=${encodeURIComponent(douyinUrl)}`);
                const data = await response.json();

                if (data.success) {
                    const videoData = data.data;
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>解析成功！</strong><br>
                            标题: ${videoData.title}<br>
                            作者: ${videoData.author}<br>
                            点赞: ${videoData.like_count}<br>
                            <a href="${videoData.video_url}" target="_blank" style="color: #667eea;">点击下载视频</a>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error"><strong>解析失败：</strong>${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error"><strong>请求失败：</strong>${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
