<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaTools - 免费在线图片视频处理工具</title>
    <meta name="description" content="免费在线图片格式转换、图片压缩、图片尺寸调整、视频去水印等工具">
    <meta name="keywords" content="图片转换,图片压缩,图片尺寸调整,视频去水印,在线工具">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tool-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .tool-title {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #333;
        }

        .tool-desc {
            color: #666;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* 视频去水印特定样式 */
        .watermark-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 20px;
        }

        .legal-notice {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .legal-notice h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .legal-notice p {
            color: #856404;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .download-area {
            background: #d4edda;
            border: 2px solid #28a745;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .download-area.show {
            display: block;
        }

        .download-area h3 {
            color: #155724;
            margin-bottom: 10px;
        }

        .download-area a {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
        }

        .download-area a:hover {
            background: #218838;
        }

        .error-area {
            background: #f8d7da;
            border: 2px solid #dc3545;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-area.show {
            display: block;
        }

        .error-area p {
            color: #721c24;
        }

        .method-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        .method-info.success {
            color: #28a745;
        }

        .method-info.fail {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MediaTools</h1>
            <p class="subtitle">免费在线图片视频处理工具</p>
        </header>

        <!-- 视频去水印功能 -->
        <div class="watermark-section">
            <h2>🎥 视频去水印</h2>

            <!-- 法律声明 -->
            <div class="legal-notice">
                <h3>⚠️ 法律声明</h3>
                <p><strong>本功能仅供个人学习和研究使用，不得用于以下用途：</strong></p>
                <ul>
                    <li>❌ 商业用途</li>
                    <li>❌ 传播他人作品</li>
                    <li>❌ 侵犯版权</li>
                    <li>❌ 其他非法用途</li>
                </ul>
                <p><strong>使用即代表您同意本免责声明。</strong></p>
            </div>

            <!-- 视频输入 -->
            <div class="input-group">
                <label for="videoUrl">输入抖音视频链接：</label>
                <input type="text" id="videoUrl" placeholder="https://www.douyin.com/video/xxx">
            </div>

            <button class="btn" onclick="removeWatermark()">去水印</button>

            <!-- 下载区域 -->
            <div class="download-area" id="downloadArea">
                <h3>✅ 去水印成功！</h3>
                <a id="downloadLink" href="#" download>下载无水印视频</a>
                <p class="method-info success" id="methodUsed">使用方法：API逆向</p>
            </div>

            <!-- 错误提示 -->
            <div class="error-area" id="errorArea">
                <p>❌ 去水印失败，请尝试手动下载或稍后再试。</p>
                <p style="margin-top: 10px; font-size: 0.85rem;">提示：如果所有方法都失败，建议手动下载视频后使用其他工具去水印。</p>
            </div>
        </div>

        <!-- 其他工具网格 -->
        <div class="tools-grid">
            <div class="tool-card">
                <div class="tool-icon">🖼️</div>
                <div class="tool-title">图片格式转换</div>
                <div class="tool-desc">支持 PNG、JPG、WEBP 格式互相转换</div>
            </div>

            <div class="tool-card">
                <div class="tool-icon">📉</div>
                <div class="tool-title">图片压缩</div>
                <div class="tool-desc">压缩图片大小，保持画质</div>
            </div>

            <div class="tool-card">
                <div class="tool-icon">📐</div>
                <div class="tool-title">图片尺寸调整</div>
                <div class="tool-desc">调整图片宽高比和尺寸</div>
            </div>
        </div>
    </div>

    <script>
        async function removeWatermark() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const downloadArea = document.getElementById('downloadArea');
            const errorArea = document.getElementById('errorArea');

            // 验证输入
            if (!videoUrl) {
                alert('请输入视频链接');
                return;
            }

            // 验证是否为抖音链接
            if (!videoUrl.includes('douyin.com')) {
                alert('请输入抖音视频链接');
                return;
            }

            // 显示加载状态
            downloadArea.classList.remove('show');
            errorArea.classList.remove('show');

            try {
                // 调用后端API
                const response = await fetch('/api/douyin/remove-watermark', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: videoUrl })
                });

                const data = await response.json();

                if (data.success) {
                    // 显示下载链接
                    document.getElementById('downloadLink').href = data.url;
                    document.getElementById('methodUsed').textContent =
                        `使用方法：${data.method}`;
                    downloadArea.classList.add('show');
                } else {
                    // 显示错误
                    errorArea.classList.add('show');
                }
            } catch (error) {
                console.error('去水印失败:', error);
                errorArea.classList.add('show');
            }
        }
    </script>
</body>
</html>
